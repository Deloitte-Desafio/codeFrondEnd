<div class="appointment-wrapper">
  <div class="appointment-container">
    <div class="appointment-header">
      <h2>Agendar Serviço</h2>
      <p>Preencha os dados para agendar um serviço</p>
    </div>

    <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()" class="appointment-form">
      <div class="form-group">
        <label for="professionalEmail" class="form-label">
          <i class="fas fa-user-tie"></i> Profissional
        </label>
        <select 
          id="professionalEmail" 
          formControlName="professionalEmail" 
          class="form-input"
          [ngClass]="{ 'input-error': appointmentForm.get('professionalEmail')?.touched && appointmentForm.get('professionalEmail')?.invalid }"
        >
          <option value="" disabled selected>Selecione o profissional</option>
          <option *ngFor="let professional of professionals" [value]="professional.email">
            {{ professional.name }} ({{ professional.profession }})
          </option>
        </select>
        <div *ngIf="appointmentForm.get('professionalEmail')?.touched && appointmentForm.get('professionalEmail')?.invalid" class="error-message">
          <i class="fas fa-exclamation-circle"></i> Seleção do profissional é obrigatória
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="date" class="form-label">
            <i class="fas fa-calendar-alt"></i> Data
          </label>
          <input 
            type="date" 
            id="date" 
            formControlName="date" 
            class="form-input"
            [ngClass]="{ 'input-error': appointmentForm.get('date')?.touched && appointmentForm.get('date')?.invalid }"
          >
          <div *ngIf="appointmentForm.get('date')?.touched && appointmentForm.get('date')?.invalid" class="error-message">
            <div *ngIf="appointmentForm.get('date')?.errors?.['required']">
              <i class="fas fa-exclamation-circle"></i> Data é obrigatória
            </div>
            <div *ngIf="appointmentForm.get('date')?.errors?.['pastDate']">
              <i class="fas fa-exclamation-circle"></i> Data não pode ser no passado
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="time" class="form-label">
            <i class="fas fa-clock"></i> Hora
          </label>
          <input 
            type="time" 
            id="time" 
            formControlName="time" 
            class="form-input"
            [ngClass]="{ 'input-error': appointmentForm.get('time')?.touched && appointmentForm.get('time')?.invalid }"
          >
          <div *ngIf="appointmentForm.get('time')?.touched && appointmentForm.get('time')?.invalid" class="error-message">
            <i class="fas fa-exclamation-circle"></i> Hora é obrigatória
          </div>
        </div>
      </div>

      
      <div class="form-group">
        <label for="serviceType" class="form-label">
          <i class="fas fa-concierge-bell"></i> Tipo de Serviço
        </label>
        <select 
          id="serviceType" 
          formControlName="serviceType" 
          class="form-input"
          [ngClass]="{ 'input-error': appointmentForm.get('serviceType')?.touched && appointmentForm.get('serviceType')?.invalid }"
        >
          <option value="" disabled selected>Selecione o tipo de serviço</option>
          <option *ngFor="let type of serviceTypes" [value]="type">{{type}}</option>
        </select>
        <div *ngIf="appointmentForm.get('serviceType')?.touched && appointmentForm.get('serviceType')?.invalid" class="error-message">
          <i class="fas fa-exclamation-circle"></i> Tipo de serviço é obrigatório
        </div>
      </div>

      
      <div class="form-group">
        <label for="notes" class="form-label">
          <i class="fas fa-sticky-note"></i> Observações (Opcional)
        </label>
        <textarea 
          id="notes" 
          formControlName="notes" 
          placeholder="Alguma informação adicional sobre o serviço"
          class="form-input"
          rows="3"
        ></textarea>
      </div>

      
      <div *ngIf="errorMessage" class="alert-message error">
        <i class="fas fa-exclamation-triangle"></i> {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="alert-message success">
        <i class="fas fa-check-circle"></i> {{ successMessage }}
      </div>

      <button type="submit" class="submit-button" [disabled]="appointmentForm.invalid">
        <i class="fas fa-calendar-check"></i> Agendar
      </button>
    </form>
  </div>
</div>
