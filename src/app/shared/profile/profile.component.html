<div class="profile-page">
  <div class="profile-container" >
    <div class="profile-header">
      <h2>Meu Perfil</h2>
      <div class="avatar">
        <span>{{ user.nome }}</span>
      </div>
    </div>

    <div class="profile-info">
      <div class="info-item">
        <span class="label">Nome:</span>
        <span class="value">{{ user.nome }}</span>
      </div>
      
      <div class="info-item">
        <span class="label">Email:</span>
        <span class="value">{{ user.email }}</span>
      </div>
      
      <div class="info-item">
        <span class="label">Tipo de Usuário:</span>
        <span class="value">{{ user.tipoUsuario }}</span>
      </div>
      
      <div class="info-item">
        <span class="label">ID:</span>
        <span class="value">{{ user.id }}</span>
      </div>
    </div>

    <div class="user-type-banner" *ngIf="user.tipoUsuario === 'PROFISSIONAL'">
      <h3><i class="fas fa-user-tie"></i> Você é um Profissional</h3>
      <p>Acesso completo ao sistema</p>
    </div>

    <div class="user-type-banner" *ngIf="user.tipoUsuario === 'CLIENTE'">
      <h3><i class="fas fa-user"></i> Você é um Cliente</h3>
      <p>Acesso às funcionalidades básicas</p>
    </div>

    <div class="profile-actions">
      <button class="edit-btn" (click)="editProfile()">
        <i class="fas fa-edit"></i> Editar Perfil
      </button>
      <button class="logout-btn" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i> Sair
      </button>
    </div>
  </div>

</div>
